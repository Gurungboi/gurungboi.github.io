<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found · Sunil Gurung</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>

<style>
  /* Inline styles so this page is self-contained */

  :root {
    --paper:  #F2ECE3;
    --paper2: #EAE2D7;
    --ink:    #110E0B;
    --ink2:   #322D28;
    --muted:  #8A7E74;
    --red:    #C03A10;
    --red2:   #E04A18;
    --rule:   #D0C8BC;
    --white:  #FDFAF6;
  }

  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html {
    scroll-behavior: auto;
  }

  body {
    background: var(--ink);
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    position: relative;
    overflow: hidden;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: -50%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.035;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(192, 58, 16, 0.15) 0%, transparent 65%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
  }

  .content {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 480px;
  }

  .code {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 16px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: clamp(3rem, 8vw, 6rem);
    letter-spacing: -0.05em;
    line-height: 0.9;
    color: var(--white);
    margin-bottom: 24px;
  }

  .title em {
    color: var(--red);
    font-style: italic;
  }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    line-height: 1.7;
    color: rgba(253, 250, 246, 0.5);
    margin-bottom: 36px;
  }

  .back-link {
    font-family: 'DM Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--red);
    color: #fff;
    padding: 12px 24px;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s, transform 0.15s;
  }

  .back-link:hover {
    background: var(--red2);
    transform: translateY(-2px);
  }

  .footer {
    position: fixed;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.15);
    z-index: 1;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="content">
  <div class="code">Error 404</div>
  <h1 class="title">Page<br/><em>Not Found.</em></h1>
  <p class="message">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="back-link">Back to Portfolio</a>
</div>

<div class="footer">Sunil Gurung · iOS · Android · KMP</div>

</body>
</html>
